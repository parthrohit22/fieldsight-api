name: Deploy FieldSight API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Create clean deployment zip
        run: |
          zip -r app.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "node_modules/*"

      - name: Clean existing deployment
        run: |
          curl -X POST \
            -u "${{ secrets.AZURE_WEBAPP_USERNAME }}:${{ secrets.AZURE_WEBAPP_PASSWORD }}" \
            https://fieldsight-api-gaf0fndvbhg2fshs.scm.swedencentral-01.azurewebsites.net/api/command \
            -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/wwwroot/*"}'

      - name: Deploy via ZipDeploy
        run: |
          curl -X POST \
            -u "${{ secrets.AZURE_WEBAPP_USERNAME }}:${{ secrets.AZURE_WEBAPP_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @app.zip \
            https://fieldsight-api-gaf0fndvbhg2fshs.scm.swedencentral-01.azurewebsites.net/api/zipdeploy