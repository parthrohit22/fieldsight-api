name: CI/CD – FieldSight API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm run test --if-present

      - name: Create clean release directory
        run: |
          mkdir release
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules/.cache' \
            ./ release/

      - name: Install production dependencies
        run: |
          cd release
          npm ci --omit=dev

      - name: Zip release artifact
        run: |
          cd release
          zip -r ../app.zip .
          cd ..

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-package
          path: app.zip

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-package

      - name: Deploy via Azure ZipDeploy
        run: |
          curl -X POST \
            -u "${{ secrets.AZURE_WEBAPP_USERNAME }}:${{ secrets.AZURE_WEBAPP_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @app.zip \
            https://fieldsight-api-gaf0fndvbhg2fshs.scm.swedencentral-01.azurewebsites.net/api/zipdeploy?isAsync=true